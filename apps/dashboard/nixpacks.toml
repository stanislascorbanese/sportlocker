# Nixpacks config pour le service Railway @sportlocker/dashboard.
#
# ⚠️ PRÉREQUIS RAILWAY : le service doit avoir Root Directory = `/`
#    (racine du repo), PAS `apps/dashboard/`. Sinon :
#      - Nixpacks ne voit pas pnpm-workspace.yaml ni pnpm-lock.yaml
#      - le workspace dep `@sportlocker/types: workspace:*` ne résout pas
#      - Nixpacks fallback sur npm
#
# Pour pointer Railway sur ce fichier : Service → Settings → Build →
#   Custom Nixpacks Config File Path = `apps/dashboard/nixpacks.toml`

[phases.setup]
nixPkgs = ['nodejs_20', 'pnpm-9_x']

[phases.install]
# corepack pour matcher la version exacte déclarée dans package.json#packageManager
#
# `--ignore-scripts` : pnpm install avec --frozen-lockfile parcourt tout le
# lockfile pour vérifier la cohérence, ce qui déclenche les postinstall des
# deps d'autres workspaces (notamment react-native-screens dans apps/mobile
# qui requiert `bob`/`husky` non installés). Le dashboard n'a aucun
# postinstall critique (sharp dégrade proprement vers squoosh), on les skip.
cmds = [
  'corepack enable',
  'corepack prepare pnpm@9.0.0 --activate',
  'pnpm install --frozen-lockfile --filter=@sportlocker/dashboard... --ignore-scripts',
]

[phases.build]
cmds = ['pnpm --filter @sportlocker/dashboard build']

[start]
cmd = 'pnpm --filter @sportlocker/dashboard start'
