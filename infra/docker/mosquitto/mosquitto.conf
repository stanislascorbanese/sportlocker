# Broker MQTT pour le dev local — équivalent simplifié d'EMQX Cloud (prod).
# Permet à l'agent firmware (firmware-sim) et l'API d'échanger sans cloud.
#
# NE PAS utiliser tel quel en prod : allow_anonymous + 0 auth.

listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe

# Garde un retain raisonnable pour le topic status (LWT).
max_queued_messages 1000
