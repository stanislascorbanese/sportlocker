version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: sportlocker-postgres
    environment:
      POSTGRES_DB: sportlocker_dev
      POSTGRES_USER: sportlocker
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportlocker-redis
    ports:
      - '6379:6379'

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sportlocker-mosquitto
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  firmware-sim:
    build:
      context: ../../services/firmware
      dockerfile: Dockerfile.sim
    container_name: sportlocker-firmware-sim
    depends_on:
      - mosquitto
    environment:
      DEVICE_ID: '00000000-0000-0000-0000-000000000000'
      DEVICE_API_KEY: dev-key
      JWT_DEVICE_SECRET: dev-jwt-device-secret-change-me
      MQTT_URL: mqtt://mosquitto:1883
      CALIBRATION_PATH: /etc/sportlocker/calibration.json
      FIRMWARE_DB_PATH: /var/lib/sportlocker/agent.db
    volumes:
      - ./firmware-sim/calibration.json:/etc/sportlocker/calibration.json:ro
      - firmware_sim_data:/var/lib/sportlocker

volumes:
  pg_data:
  mosquitto_data:
  mosquitto_log:
  firmware_sim_data:
