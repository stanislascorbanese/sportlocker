version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: sportlocker-postgres
    environment:
      POSTGRES_DB: sportlocker_dev
      POSTGRES_USER: sportlocker
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sportlocker-redis
    ports:
      - '6379:6379'

volumes:
  pg_data:
