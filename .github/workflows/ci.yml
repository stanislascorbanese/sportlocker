# CI SportLocker — typecheck + tests sur tout le monorepo.
#
# Déclenchée :
#   - sur chaque push vers `main` (filet final, sécurise les merges)
#   - sur chaque PR ciblant `main` (gate avant merge)
#
# Notes :
#   - Les tests API utilisent testcontainers (Postgres + Redis). Le runner
#     `ubuntu-latest` a Docker pré-installé, rien à setup.
#   - pnpm est pinné à 9.0.0 via corepack pour matcher package.json#packageManager.
#   - Turbo cache + pnpm store cache pour les rebuilds rapides.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Une seule run par ref : on cancel les anciennes quand un nouveau push arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + tests (node)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20 + pnpm (via corepack)
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Activate pnpm 9.0.0
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # --ignore-scripts : héritage de l'époque où `apps/mobile` (Expo RN,
      # supprimé en mai 2026) embarquait `react-native-screens` dont le
      # postinstall exigeait `bob`/`husky`. Maintenu pour l'instant car
      # nos postinstall critiques (esbuild, sharp) sont rebuild explicitement
      # ci-dessous. À tenter de retirer dans une PR séparée pour valider
      # qu'aucune autre dep tierce n'introduit un postinstall problématique.
      - name: Install dependencies (sans postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # esbuild a besoin de son binaire natif (téléchargé normalement par
      # son postinstall) pour que vitest fonctionne.
      # sharp a aussi un binaire natif (libvips) requis par astro:assets
      # pour générer les variantes WebP/AVIF au build (sinon « Could not
      # find Sharp »). Cf. incident #93/#94.
      # On les rebuild explicitement — pnpm rebuild sans args rebuilderait
      # TOUT et re-déclencherait le postinstall react-native-screens.
      - name: Rebuild binaires natifs (esbuild pour vitest, sharp pour astro:assets)
        run: |
          pnpm rebuild esbuild || true
          pnpm rebuild sharp || true

      - name: Typecheck
        run: pnpm typecheck

      # Tests de tous les packages SAUF l'API (turbo, mis en cache).
      - name: Tests (hors API)
        run: pnpm exec turbo run test --filter='!@sportlocker/api'

      # Gate de couverture API : vitest.config impose des seuils per-fichier
      # (80% sur src/routes/**, 90% sur reservations.ts). `pnpm test` ne passe
      # pas --coverage, donc ces seuils n'étaient jamais vérifiés en CI et la
      # couverture pouvait dériver. On relance l'API avec --coverage pour faire
      # échouer le build si une route critique repasse sous son seuil.
      - name: Tests + couverture API (gate seuils routes)
        run: pnpm --filter @sportlocker/api test:coverage

      # Build du site vitrine — `astro check` (typecheck) ne lance pas la
      # pipeline d'optimisation d'images, donc des bugs comme « sharp not
      # found » ou des assets manquants passent inaperçus. Cf. #94.
      - name: Build (apps/web)
        run: pnpm --filter @sportlocker/web build

  # ─── Firmware Python (services/firmware) ─────────────────────────────
  # Job parallèle au job Node ci-dessus. Lance ruff + pytest avec coverage
  # sur l'agent firmware. Indépendant de l'install pnpm — les deux jobs
  # tournent en parallèle.
  firmware:
    name: firmware (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            services/firmware/pyproject.toml
            services/firmware/requirements.txt

      # pyzbar (lecture QR) charge dynamiquement libzbar via ctypes au
      # premier import → indispensable même quand cv2/pyzbar sont mockés
      # dans les tests. libgl1 est requis par opencv-python (le wheel
      # non-headless qu'on installe ici).
      - name: Install system libs (libzbar, libGL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libzbar0 libgl1

      - name: Install firmware (dev extras)
        working-directory: services/firmware
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: services/firmware
        run: ruff check src tests

      - name: Pytest + coverage
        working-directory: services/firmware
        run: pytest --cov=src --cov-fail-under=80
