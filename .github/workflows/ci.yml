# CI SportLocker — typecheck + tests sur tout le monorepo.
#
# Déclenchée :
#   - sur chaque push vers `main` (filet final, sécurise les merges)
#   - sur chaque PR ciblant `main` (gate avant merge)
#
# Notes :
#   - Les tests API utilisent testcontainers (Postgres + Redis). Le runner
#     `ubuntu-latest` a Docker pré-installé, rien à setup.
#   - pnpm est pinné à 9.0.0 via corepack pour matcher package.json#packageManager.
#   - Turbo cache + pnpm store cache pour les rebuilds rapides.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Une seule run par ref : on cancel les anciennes quand un nouveau push arrive
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + tests (node)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 + pnpm (via corepack)
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Activate pnpm 9.0.0
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # --ignore-scripts : pnpm avec --frozen-lockfile télécharge TOUS les
      # packages du lockfile dans le store et exécute leurs postinstall,
      # indépendamment d'un éventuel --filter. react-native-screens (dep
      # de apps/mobile) a un postinstall qui exige `bob` non dispo sur les
      # runners. Même fix que sur Nixpacks dashboard (commit beb31b8).
      - name: Install dependencies (sans postinstall scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # esbuild a besoin de son binaire natif (téléchargé normalement par
      # son postinstall) pour que vitest fonctionne. On rebuild juste ce
      # package — pnpm rebuild sans args rebuilderait TOUT et re-déclencherait
      # le postinstall react-native-screens.
      - name: Rebuild esbuild (binaire natif pour vitest)
        run: pnpm rebuild esbuild || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

  # ─── Firmware Python (services/firmware) ─────────────────────────────
  # Job parallèle au job Node ci-dessus. Lance ruff + pytest avec coverage
  # sur l'agent firmware. Indépendant de l'install pnpm — les deux jobs
  # tournent en parallèle.
  firmware:
    name: firmware (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            services/firmware/pyproject.toml
            services/firmware/requirements.txt

      # pyzbar (lecture QR) charge dynamiquement libzbar via ctypes au
      # premier import → indispensable même quand cv2/pyzbar sont mockés
      # dans les tests. libgl1 est requis par opencv-python (le wheel
      # non-headless qu'on installe ici).
      - name: Install system libs (libzbar, libGL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libzbar0 libgl1

      - name: Install firmware (dev extras)
        working-directory: services/firmware
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: services/firmware
        run: ruff check src tests

      - name: Pytest + coverage
        working-directory: services/firmware
        run: pytest --cov=src --cov-fail-under=80
